name: Slice 0 Validation

on:
  pull_request:
    paths:
      - "prototype/slice0/**"
      - "AGENTS.md"
      - "CURRENT_STATE.md"
      - "tools/automation/**"
      - ".github/workflows/slice0.yml"
  push:
    branches: [main]
    paths:
      - "prototype/slice0/**"
      - "AGENTS.md"
      - "CURRENT_STATE.md"
      - "tools/automation/**"
      - ".github/workflows/slice0.yml"

permissions:
  contents: read

jobs:
  test-and-evidence-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/slice0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: prototype/slice0/pyproject.toml
      - name: Install prototype
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Regenerate deterministic evidence
        run: python -m cadence_professional_slice0 --fixtures fixtures --output evidence
      - name: Reject evidence drift
        run: git diff --exit-code -- evidence
